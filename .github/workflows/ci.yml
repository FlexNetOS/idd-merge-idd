name: ci

# Workspace-level CI for the rusty-idd Cargo workspace.
# Relocated from intent-driven-development/.github/ (GitHub only runs workflows
# under the repo-root .github/) and upgraded to run across the whole workspace.
#
# Blocking gates: the Rust-native drift gate, a workspace build, and the test
# suite. fmt/clippy run as NON-BLOCKING reporters for now: the two crates were
# assembled from separate upstreams and are not yet rustfmt/clippy-clean to the
# current toolchain (a ~1700-line mechanical cleanup). A dedicated "fmt + clippy
# cleanup" slice will format the tree and flip these to blocking (remove the
# `continue-on-error` lines). See docs/rusty-idd/slice-sequence.md.

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: Rust-native drift gate
        run: bash .claude/skills/merge-verification/scripts/drift-check.sh .
      - name: Build (workspace)
        run: cargo build --workspace --locked
      - name: Test (workspace)
        run: cargo test --workspace --locked
      - name: Format (non-blocking until cleanup slice)
        continue-on-error: true
        run: cargo fmt --all -- --check
      - name: Clippy (non-blocking until cleanup slice)
        continue-on-error: true
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings
