name: ci

# Workspace-level CI for the rusty-idd Cargo workspace.
# Relocated from intent-driven-development/.github/ (GitHub only runs workflows
# under the repo-root .github/) and upgraded to run across the whole workspace.
#
# All gates are blocking: the Rust-native drift gate, build, test, fmt, and
# clippy (-D warnings). The fmt+clippy cleanup slice formatted both crates and
# cleared all lints, so these are now enforced.

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: Rust-native drift gate
        run: bash .claude/skills/merge-verification/scripts/drift-check.sh .
      - name: Build (workspace)
        run: cargo build --workspace --locked
      - name: Test (workspace)
        run: cargo test --workspace --locked
      - name: Format
        run: cargo fmt --all -- --check
      - name: Clippy
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings
