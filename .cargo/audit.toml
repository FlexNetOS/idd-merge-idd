# cargo-audit advisory baseline (auto-loaded from ./.cargo/audit.toml by `cargo audit`).
#
# This is the SHARED, repo-wide baseline: it is read by EVERY `cargo audit`
# invocation in the workspace — both the develop CI gate (.github/workflows/ci.yml)
# and the develop->main promotion gate (.github/workflows/promote-verify.yml).
#
# Therefore it lists ONLY advisories we accept repo-wide. It deliberately does NOT
# list the `time` DoS vulnerability (RUSTSEC-2026-0009): that one is tolerated on
# the develop gate via an explicit `--ignore` flag in ci.yml (until backlog A2
# upgrades `time`), but MUST keep blocking the main promotion gate — so it cannot
# live in this shared file.
#
# Each entry below is an accepted-risk, transitive, unmaintained-only advisory
# pulled in via syntect (tui-markdown / comrak). Tracked by backlog A3, which will
# upgrade syntect/comrak/tui-markdown forward to drop them and remove these lines.
[advisories]
ignore = [
    "RUSTSEC-2025-0141", # bincode 1.3.3 unmaintained (via syntect) — backlog A3
    "RUSTSEC-2024-0320", # yaml-rust 0.4.5 unmaintained (via syntect) — backlog A3
]
